version: '3.8'

services:
  app:
    build: .
    container_name: app_biblioteca
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mariadb:10.4
    container_name: db_biblioteca
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biblioteca
    ports:
      - "3306:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d